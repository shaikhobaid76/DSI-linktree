<head>

<title>DESIGN SPACE INTERIOX · premium link hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
font-family:'Poppins','Inter',sans-serif;
}

/* STATIC BACKGROUND (NO ZOOM / NO MOVE) */
body{
background:url("images/bg7.png") center center/cover no-repeat;
background-color:#faf0e1;
position:relative;
}

/* overlay */
body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-color:rgba(250,240,225,0.2);
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
pointer-events:none;
z-index:0;
}

.main-container{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100%;
padding:2rem 1.5rem;
}

.content{
max-width:580px;
width:100%;
text-align:center;
}

/* LOGO */

.logo-block{
margin-bottom:2.5rem;
position:relative;
}

.logo-link{
display:flex;
justify-content:center;
animation:logoReveal 1.2s cubic-bezier(0.23,1,0.32,1) forwards;
}

.logo-circle{
width:220px;
height:220px;
background:linear-gradient(145deg,#ffffff,#f5ebe1);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:
0 20px 35px -10px rgba(100,60,30,0.4),
inset 0 -3px 0 rgba(0,0,0,0.05),
inset 0 3px 5px rgba(255,255,255,0.8);
border:4px solid rgba(245,230,215,0.9);
overflow:hidden;
transition:.5s;
position:relative;
}

.logo-circle::before{
content:'';
position:absolute;
top:-15px;
left:-15px;
right:-15px;
bottom:-15px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%,rgba(215,170,120,0.9),rgba(180,140,90,0.3) 50%,transparent 80%);
z-index:-1;
animation:premiumGlow 3s ease-in-out infinite;
filter:blur(5px);
}

@keyframes premiumGlow{
0%,100%{opacity:.4;}
50%{opacity:.8;}
}

.logo-circle img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

@keyframes logoReveal{
0%{opacity:0;transform:translateY(-40px) scale(.9);}
100%{opacity:1;transform:translateY(0) scale(1);}
}

/* COMPANY NAME */

.company-name{
font-family:'Playfair Display',serif;
font-size:1.6rem;
font-weight:700;

background:linear-gradient(135deg,#5a3e28,#8b6f50,#5a3e28);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

display:inline-block;
padding:.4rem 2rem;
border-radius:50px;

backdrop-filter:blur(10px);
background-color:rgba(250,240,220,.3);
border:1px solid rgba(215,180,140,.5);

margin-top:1.8rem;
letter-spacing:1px;

animation:textReveal .8s ease-out .3s forwards;

opacity:0;
white-space:nowrap;
position:relative;
overflow:hidden;
}

/* SHINE EFFECT */

.company-name::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);
animation:shine 4s infinite;
}

@keyframes shine{
0%{left:-100%;}
20%{left:100%;}
100%{left:100%;}
}

@keyframes textReveal{
0%{opacity:0;transform:translateY(20px) scale(.95);}
100%{opacity:1;transform:translateY(0) scale(1);}
}

/* LINKS */

.links-list{
display:flex;
flex-direction:column;
gap:1.2rem;
width:100%;
margin-top:2rem;
}

.link-item{
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;

background:rgba(255,250,240,.75);
backdrop-filter:blur(12px);

color:#5a3e28;

padding:1.1rem 1.8rem;

border-radius:16px;

font-weight:600;
font-size:1.25rem;

border:1.5px solid rgba(215,180,140,.6);

box-shadow:0 10px 25px -8px rgba(90,60,30,.3);

transition:.4s;

gap:15px;

opacity:0;
}

.link-item:hover{
transform:translateY(-5px) scale(1.02);
background:#8b6f50;
color:#fff;
}

.link-item i{
font-size:1.8rem;
width:2.2rem;
text-align:center;
color:#8b5a3c;
}

/* FLOAT */

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

/* SLIDE ANIMATION */

@keyframes slideInLeftAdvanced{
0%{opacity:0;transform:translateX(-60px) rotate(-2deg);}
60%{opacity:.8;transform:translateX(10px) rotate(1deg);}
100%{opacity:1;transform:translateX(0) rotate(0);}
}

@keyframes slideInRightAdvanced{
0%{opacity:0;transform:translateX(60px) rotate(2deg);}
60%{opacity:.8;transform:translateX(-10px) rotate(-1deg);}
100%{opacity:1;transform:translateX(0) rotate(0);}
}

/* LINK ANIMATION SEQUENCE */

.link-item:nth-child(1){animation:slideInLeftAdvanced .7s forwards,float 6s ease-in-out .7s infinite;}
.link-item:nth-child(2){animation:slideInRightAdvanced .7s .1s forwards,float 6s ease-in-out .8s infinite;}
.link-item:nth-child(3){animation:slideInLeftAdvanced .7s .2s forwards,float 6s ease-in-out .9s infinite;}
.link-item:nth-child(4){animation:slideInRightAdvanced .7s .3s forwards,float 6s ease-in-out 1s infinite;}
.link-item:nth-child(5){animation:slideInLeftAdvanced .7s .4s forwards,float 6s ease-in-out 1.1s infinite;}
.link-item:nth-child(6){animation:slideInRightAdvanced .7s .5s forwards,float 6s ease-in-out 1.2s infinite;}
.link-item:nth-child(7){animation:slideInLeftAdvanced .7s .6s forwards,float 6s ease-in-out 1.3s infinite;}

/* RESPONSIVE */

@media(min-width:768px){

.link-item{
padding:1.3rem 2rem;
font-size:1.4rem;
border-radius:20px;
}

.logo-circle{
width:260px;
height:260px;
}

.company-name{
font-size:2rem;
}

}

@media(max-width:480px){

.logo-circle{
width:180px;
height:180px;
}

.company-name{
font-size:1.4rem;
padding:.3rem 1.2rem;
}

.link-item{
font-size:1.1rem;
padding:1rem 1.2rem;
}

}

</style>
</head>
